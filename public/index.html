<!DOCTYPE html>
<html>
<head>
    <title>Hostel Management</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', sans-serif;
        }

        body {
            background: #eef2f7;
        }

        header {
            text-align: center;
            padding: 20px;
            font-size: 26px;
            font-weight: bold;
            color: #333;
        }

        .container {
            max-width: 900px;
            margin: 20px auto;
            background: white;
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        .buttons {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        button {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 8px;
            background: #007bff;
            color: white;
            font-weight: bold;
            cursor: pointer;
        }

        button:hover {
            background: #0056b3;
        }

        form {
            margin-bottom: 20px;
        }

        input, select {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border-radius: 6px;
            border: 1px solid #ccc;
        }

        .rooms {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 15px;
        }

        .room {
            padding: 15px;
            border-radius: 10px;
            background: #f9f9f9;
            border-left: 5px solid #007bff;
        }

        .badge {
            padding: 4px 10px;
            border-radius: 20px;
            color: white;
            font-size: 12px;
        }

        .paid {
            background: green;
        }

        .notpaid {
            background: red;
        }

        .room button {
            margin-top: 10px;
            background: red;
            padding: 8px;
            border-radius: 6px;
        }

        #message {
            margin: 10px 0;
            font-weight: bold;
            color: green;
        }

        @media (max-width: 600px) {
            .buttons {
                flex-direction: column;
            }
        }
    </style>
</head>

<body>

<header>
    Hostel Management System
</header>

<div class="container">

    <div class="buttons">
        <button onclick="showForm()">Book Room</button>
        <button onclick="getAvailable()">Available Rooms</button>
        <button onclick="getBooked()">Booked Rooms</button>
    </div>

    <!-- FORM -->
    <form id="bookingForm" style="display:none;">
        <h3>Book a Room</h3>

        <input type="number" id="roomNo" placeholder="Room Number" required>
        <input type="text" id="name" placeholder="Student Name" required>

        <select id="fee">
            <option value="paid">Paid</option>
            <option value="not paid">Not Paid</option>
        </select>

        <button type="submit">Submit</button>
    </form>

    <p id="message"></p>

    <div class="rooms" id="rooms"></div>

</div>

<script>

// Show form
function showForm() {
    document.getElementById("bookingForm").style.display = "block"
    document.getElementById("rooms").innerHTML = ""
}

// Book room
document.getElementById("bookingForm").addEventListener("submit", async function(e) {
    e.preventDefault()

    const data = {
        roomNo: document.getElementById("roomNo").value,
        name: document.getElementById("name").value,
        fee: document.getElementById("fee").value
    }

    const res = await fetch("http://localhost:5000/book-room", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(data)
    })

    const result = await res.text()
    document.getElementById("message").innerText = result
})

// Available rooms
async function getAvailable() {
    document.getElementById("bookingForm").style.display = "none"

    const res = await fetch("http://localhost:5000/available")
    const data = await res.json()

    displayRooms(data, "Available Rooms")
}

// Booked rooms
async function getBooked() {
    document.getElementById("bookingForm").style.display = "none"

    const res = await fetch("http://localhost:5000/booked")
    const data = await res.json()

    displayRooms(data, "Booked Rooms")
}

// Unbook room
async function unbookRoom(roomNo) {
    const res = await fetch("http://localhost:5000/unbook-room", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({ roomNo })
    })

    const result = await res.text()
    document.getElementById("message").innerText = result

    getBooked()
}

// Display rooms
function displayRooms(rooms, title) {
    let html = `<h2>${title}</h2>`

    if (rooms.length === 0) {
        html += "<p>No rooms found</p>"
    } else {
        rooms.forEach(room => {
            html += `
                <div class="room">
                    <h3>Room ${room.roomNo}</h3>
                    <p><strong>Name:</strong> ${room.name || "-"}</p>
                    <p>
                        <strong>Fee:</strong> 
                        <span class="badge ${room.fee === 'paid' ? 'paid' : 'notpaid'}">
                            ${room.fee || "-"}
                        </span>
                    </p>

                    ${
                        title === "Booked Rooms"
                        ? `<button onclick="unbookRoom(${room.roomNo})">Unbook</button>`
                        : ""
                    }
                </div>
            `
        })
    }

    document.getElementById("rooms").innerHTML = html
}

</script>

</body>
</html>
